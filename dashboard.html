<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      background:
      linear-gradient(
      135deg,
      #f5fff8,
      #eef7ff
      );

      min-height:100vh;

      padding:25px;
    }

    .top-bar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:30px;
    }

    .title{

      font-size:34px;

      font-weight:700;

      color:#111827;
    }

    .create-btn{

      background:
      linear-gradient(
      135deg,
      #2E9F6B,
      #34c27d
      );

      color:white;

      padding:14px 24px;

      border-radius:18px;

      text-decoration:none;

      font-weight:600;

      font-size:16px;

      box-shadow:
      0 8px 20px rgba(46,159,107,0.25);
    }

    .events{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:22px;
    }

    .card{

      background:white;

      border-radius:28px;

      padding:24px;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.06);

      position:relative;

      overflow:hidden;
    }

    .card:hover{

      transform:translateY(-4px);

      box-shadow:
      0 14px 35px rgba(0,0,0,0.08);
    }

    .status{

      position:absolute;

      top:22px;
      right:22px;

      background:#e8f7ee;

      color:#2E9F6B;

      padding:8px 14px;

      border-radius:14px;

      font-size:13px;

      font-weight:600;
    }

    .icon{

      width:68px;
      height:68px;

      border-radius:18px;

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:34px;

      margin-bottom:20px;

      background:#eef7ff;
    }

    .event-name{

      font-size:28px;

      font-weight:700;

      color:#111827;

      margin-bottom:8px;
    }

    .event-type{

      color:#6b7280;

      font-size:17px;

      margin-bottom:22px;
    }

    .countdown{

      background:
      linear-gradient(
      135deg,
      #2E9F6B,
      #34c27d
      );

      color:white;

      padding:14px;

      border-radius:16px;

      font-size:18px;

      font-weight:600;

      text-align:center;

      margin-bottom:20px;
    }

    .details{

      display:flex;

      flex-direction:column;

      gap:12px;

      color:#374151;

      font-size:16px;
    }

    .budget{

      color:#16a34a;

      font-weight:700;

      font-size:20px;
    }

    .actions{

      display:flex;

      gap:12px;

      margin-top:24px;
    }

    .edit-btn,
    .delete-btn{

      flex:1;

      border:none;

      padding:12px;

      border-radius:14px;

      cursor:pointer;

      font-size:15px;

      font-weight:600;

      transition:0.3s;
    }

    .edit-btn{

      background:#eef7ff;

      color:#2563eb;
    }

    .delete-btn{

      background:#fee2e2;

      color:#dc2626;
    }

    .empty{

      background:white;

      padding:60px;

      border-radius:30px;

      text-align:center;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.05);
    }

    .empty h2{

      font-size:30px;

      margin-bottom:15px;
    }

    .empty p{

      color:#6b7280;

      margin-bottom:25px;
    }

    @media(max-width:700px){

      .top-bar{

        flex-direction:column;

        gap:18px;

        align-items:flex-start;
      }

      .title{
        font-size:28px;
      }

      .event-name{
        font-size:24px;
      }
    }

  </style>
</head>

<body>

  <div class="top-bar">

    <div class="title">
      Your Events
    </div>

    <a href="create.html"
    class="create-btn">

      + Create Event

    </a>

  </div>

  <div class="events"
  id="eventsContainer">

  </div>

<script>

let events =
JSON.parse(
localStorage.getItem("events")
) || [];

const container =
document.getElementById(
"eventsContainer"
);

function getCountdown(date){

  const eventDate =
  new Date(date);

  const now =
  new Date();

  const diff =
  eventDate - now;

  if(diff <= 0){

    return "Event Started";
  }

  const days =
  Math.floor(
    diff / (1000*60*60*24)
  );

  const hours =
  Math.floor(
    (diff % (1000*60*60*24))
    / (1000*60*60)
  );

  const mins =
  Math.floor(
    (diff % (1000*60*60))
    / (1000*60)
  );

  return `${days}d ${hours}h ${mins}m left`;
}

function getStatus(date){

  const now =
  new Date();

  const eventDate =
  new Date(date);

  if(eventDate < now){

    return "Completed";
  }

  const diffDays =
  Math.floor(
    (eventDate-now)
    /(1000*60*60*24)
  );

  if(diffDays <= 7){

    return "Upcoming";
  }

  return "Planned";
}

function getIcon(type){

  type =
  type.toLowerCase();

  if(type.includes("music")){

    return "🎵";
  }

  if(type.includes("tech")){

    return "💻";
  }

  if(type.includes("wedding")){

    return "💍";
  }

  if(type.includes("birthday")){

    return "🎂";
  }

  if(type.includes("sports")){

    return "🏆";
  }

  return "🎉";
}

function renderEvents(){

  if(events.length === 0){

    container.innerHTML = `

    <div class="empty">

      <h2>
        No Events Yet
      </h2>

      <p>
        Create your first event
        with PlanSmart AI
      </p>

      <a href="create.html"
      class="create-btn">

        Create Event

      </a>

    </div>

    `;

    return;
  }

  events.sort((a,b)=>
    new Date(a.date)
    -
    new Date(b.date)
  );

  container.innerHTML = "";

  events.forEach((event,index)=>{

    container.innerHTML += `

    <div class="card"
    onclick="openEvent(${index})">

      <div class="status">

        ${getStatus(event.date)}

      </div>

      <div class="icon">

        ${getIcon(event.type)}

      </div>

      <div class="event-name">

        ${event.name}

      </div>

      <div class="event-type">

        ${event.type}

      </div>

      <div class="countdown">

        ${getCountdown(event.date)}

      </div>

      <div class="details">

        <div>
          👥 Guests:
          ${event.guests}
        </div>

        <div class="budget">
          Rs.${event.budget}
        </div>

        <div>
          📅
          ${new Date(event.date)
          .toLocaleString()}
        </div>

      </div>

      <div class="actions">

        <button
        class="edit-btn"

        onclick="
        event.stopPropagation();
        editEvent(${index});
        ">

          Edit

        </button>

        <button
        class="delete-btn"

        onclick="
        event.stopPropagation();
        deleteEvent(${index});
        ">

          Delete

        </button>

      </div>

    </div>

    `;
  });
}

function openEvent(index){

  window.location.href =
  `event.html?index=${index}`;
}

function deleteEvent(index){

  const confirmDelete =
  confirm(
    "Delete this event?"
  );

  if(confirmDelete){

    events.splice(index,1);

    localStorage.setItem(
      "events",
      JSON.stringify(events)
    );

    renderEvents();
  }
}

function editEvent(index){

  localStorage.setItem(
    "editIndex",
    index
  );

  window.location.href =
  "create.html";
}

renderEvents();

</script>

</body>
</html>
